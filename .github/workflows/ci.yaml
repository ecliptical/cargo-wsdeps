name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: check
    env:
      RUSTFLAGS: '-Cinstrument-coverage'
      LLVM_PROFILE_FILE: 'target/coverage/%p-%m.profraw'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
          # Don't cache build artifacts: a restored target/ mixes
          # instrumented binaries and .profraw files across builds, which
          # makes grcov merge mismatched coverage maps and report 0%.
          cache-targets: false
      - name: Run tests
        run: |
          rm -rf target/coverage
          mkdir -p target/coverage
          cargo test --all-features
      - name: Diagnose coverage data
        run: |
          echo "=== profraw files ==="
          ls -la target/coverage/ || true
          echo "profraw count: $(ls target/coverage/*.profraw 2>/dev/null | wc -l)"
          echo "=== instrumented test binaries (deps) ==="
          for b in target/debug/deps/*; do
            if [ -x "$b" ] && file "$b" | grep -q ELF; then
              echo "$b: $(readelf -S "$b" 2>/dev/null | grep -c __llvm_prf) __llvm_prf sections"
            fi
          done
          echo "=== llvm-profdata merge ==="
          LLVM_BIN="$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin"
          "$LLVM_BIN/llvm-profdata" merge -sparse target/coverage/*.profraw -o /tmp/merged.profdata 2>&1 || true
          ls -la /tmp/merged.profdata || true
          echo "=== llvm-cov report against diff test binary ==="
          DIFF_BIN=$(ls target/debug/deps/diff-* | grep -v '\.d$' | head -1)
          echo "binary: $DIFF_BIN"
          "$LLVM_BIN/llvm-cov" report "$DIFF_BIN" -instr-profile=/tmp/merged.profdata 2>&1 | grep -E "src/|TOTAL|error" | head -20 || true
      - name: Generate coverage report
        uses: ecliptical/covdir-report-action@v0.4
        with:
          summary: 'true'
          out: ./target/coverage.md
      - name: Add coverage comment to the pull request
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        with:
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          path: ./target/coverage.md
