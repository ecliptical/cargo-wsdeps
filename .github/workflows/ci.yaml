name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: check
    env:
      RUSTFLAGS: '-Cinstrument-coverage'
      # Absolute path: the integration tests spawn the cargo-wsdeps binary
      # with a changed working directory (cmd.current_dir), so a relative
      # LLVM_PROFILE_FILE would scatter each subprocess's .profraw into the
      # test fixture dirs where grcov never finds it, leaving src/ at 0%.
      LLVM_PROFILE_FILE: '${{ github.workspace }}/target/coverage/%p-%m.profraw'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: Run tests
        run: cargo test --all-features
      - name: Generate coverage report
        uses: ecliptical/covdir-report-action@v0.4
        with:
          summary: 'true'
          out: ./target/coverage.md
      - name: Add coverage comment to the pull request
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        with:
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          path: ./target/coverage.md
